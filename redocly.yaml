apis:
  core@public:
    root: openapi/openapi.yaml
    output: docs/dev-docs/api/index.yaml
    metadata:
      description: The most common APIs used to automate common workflows.
    decorators:
      filter-in:
        property: x-products
        value:
          - Core
      plugin/change-title:
        title: Core APIs
  core@latest:
    root: openapi/openapi.yaml
    output: catalog/core.yaml
    metadata:
      description: The most common APIs used to automate common workflows.
    decorators:
      filter-in:
        property: x-products
        value:
          - Core
      plugin/change-title:
        title: Core APIs
  all@latest:
    root: openapi/openapi.yaml
    output: catalog/all.yaml
    metadata:
      description: All Rebilly APIs.
    decorators:
      plugin/remove-tag-groups: on
      plugin/change-title:
        title: All APIs
  all@3.0:
    root: openapi/openapi.yaml
    output: catalog/all-3.0.yaml
    metadata:
      description: All Rebilly APIs.
    decorators:
      plugin/remove-tag-groups: on
      plugin/change-title:
        title: All APIs
      plugin/backport-to-30: on
  storefront@latest:
    root: openapi/openapi.yaml
    output: catalog/storefront.yaml
    metadata:
      description: APIs intended to be used directly from an untrusted browser.
    decorators:
      filter-in:
        property: x-products
        value:
          - Storefront
      plugin/change-title:
        title: Storefront APIs
      plugin/remove-tag-groups: on
      plugin/remove-unused-tags: on
  reports@latest:
    root: openapi/openapi.yaml
    output: catalog/reports.yaml
    metadata:
      description: APIs for reporting purposes.
    decorators:
      filter-in:
        property: x-products
        value:
          - Reports
      plugin/change-title:
        title: Reports APIs
      plugin/remove-tag-groups: on
      plugin/remove-unused-tags: on
  combined@latest:
    root: openapi/openapi.yaml
    output: catalog/combined.yaml
    metadata:
      description: Combined APIs for who knows what. Maybe we can remove this since we have "All"?
    decorators:
      filter-in:
        property: x-products
        value:
          - Combined
      plugin/change-title:
        title: Combined APIs
      plugin/remove-tag-groups: on
      plugin/remove-unused-tags: on
  users@latest:
    root: openapi/openapi.yaml
    output: catalog/users.yaml
    metadata:
      description: Users APIs for who knows what. Maybe we can remove this since we have "All"?
    decorators:
      filter-in:
        property: x-products
        value:
          - Users
      plugin/change-title:
        title: Users APIs
      plugin/remove-tag-groups: on
      plugin/remove-unused-tags: on

extends:
  - ./lint-ruleset.yaml
plugins:
  - ./plugins/custom-rules.js
  - ./plugins/decorators.js
  - ./plugins/products-bundler/bundler.js

decorators:
  products-bundler/bundle: error
  plugin/remove-php-sample-prefix: on
openapi:
  pagination: item
  theme:
    logo:
      gutter: 20px 30px 14px 30px
    colors:
      primary:
        main: '#0044D4'
      text:
        primary: '#0D2B3E'
    typography:
      headings:
        fontFamily: Roboto
      fontFamily: 'Roboto, Verdana, Geneva, sans-serif'
      fontSize: 14px
      code:
        fontFamily: '"Courier New",monospace'
      rightPanelHeading:
        color: white
    rightPanel:
      backgroundColor: '#505A6F'
    codeBlock:
      backgroundColor: '#0D2B3E'
    links:
      color: '#6CC496'
  htmlTemplate: ./web/index.html
  generateCodeSamples:
    languages:
      - lang: curl
      - lang: Node.js
      - lang: Ruby
      - lang: C#
      - lang: Go
      - lang: Python
      - lang: Java
  schemaExpansionLevel: '2'
  maxDisplayedEnumValues: 10
  hideTryItPanel: false
  expandResponses: '200,201'
  requiredPropsFirst: true
catalogClassic:
  rebilly-catalog:
    title: Rebilly API catalog
    description: Discover how our APIs can support your business.
    slug: /catalog/
    items:
      - directory: ./catalog
        flatten: true
        includeByMetadata:
          type: [openapi]
navbar:
  items:
    - page: /catalog/
      label: Catalog
    - page: /contributing/
      label: Contributing
logo:
  altText: Rebilly API catalog
  image: ./web/rb_apiLogo.svg
ignore:
  - '.github' # works
  # - 'openapi'
  - 'plugins'
  - 'web'
  # - 'CONTRIBUTING.md'
  # - 'README.md'
