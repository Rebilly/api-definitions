type: object
properties:
  metric:
    $ref: ./DashboardMetric.yaml
  value:
    type:
      - 'number'
      - 'null'
    format: double
    description: Tile value for the specified date range.
  previousValue:
    type:
      - 'number'
      - 'null'
    format: double
    description: |-
      Tile value for the previous date range.
      This value is relative to the specified date range.
  timeseries:
    description: Time series of tile values across the specified date range.
    type: array
    maxItems: 100
    items:
      type: object
      description: Chart data point.
      readOnly: true
      properties:
        date:
          type: string
          description: Date and time of the entry.
        value:
          type:
            - 'number'
            - 'null'
          description: Value of the entry.
