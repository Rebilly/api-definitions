type: object
required:
  - title
  - tiles
properties:
  title:
    type: string
    description: Title of the dashboard tab.
    minLength: 2
    maxLength: 12
    example: KYC
  tiles:
    type: array
    description: List of tiles displayed on the dashboard tab.
    maxItems: 20
    items:
      $ref: ./DashboardTile.yaml
  preset:
    type:
      - 'string'
      - 'null'
    description: |-
      Specifies which preset the tab is associated with.
      The preset is independent of the tiles configured on the tab.
    enum:
      - Payments
      - Billing
      - KYC
