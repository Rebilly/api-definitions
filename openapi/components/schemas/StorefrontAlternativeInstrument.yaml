type: object
title: Alternative instrument
properties:
  id:
    description: ID of the payment instrument.
    readOnly: true
    $ref: ./ResourceId.yaml
  method:
    description: Payment method of the payment instrument.
    allOf:
      - $ref: ./AlternativePaymentMethods.yaml
      - not:
          enum:
            - payment-card
            - paypal
            - ach
            - echeck
            - Khelocard
  billingAddress:
    description: Billing address of the user that is associated with the payment instrument.
    $ref: ./ContactObject.yaml
  status:
    description: Payment instrument status.
    type: string
    readOnly: true
    enum:
      - active
      - deactivated
  useAsBackup:
    $ref: ./UseAsBackup.yaml
  createdTime:
    $ref: ./CreatedTime.yaml
  updatedTime:
    $ref: ./UpdatedTime.yaml
  lastPaymentTime:
    $ref: ./LastPaymentTime.yaml
  customFields:
    $ref: ./ResourceCustomFields.yaml
  referenceData:
    description: |-
      Subset of payment instrument reference data available to the authenticated customer.
      Contains only fields that are safe to expose on the Storefront.
    type: object
    readOnly: true
    properties:
      walletName:
        description: Name of the cryptocurrency wallet associated with the payment instrument. This field is only applicable for cryptocurrency payment instruments.
        type:
          - 'string'
          - 'null'
    additionalProperties: false
  token:
    description: |-
      New customer JSON Web Token (JWT) that is used for further requests.
      This value is null if the customer is already authenticated.
    type:
      - 'string'
      - 'null'
    readOnly: true
  _links:
    $ref: ./SelfLink.yaml
