type: object
required:
  - creditMemoId
  - amount
properties:
  creditMemoId:
    type: string
    description: ID of the credit memo.
    readOnly: true
    maxLength: 50
    example: crmm_0YVCNN22TWC3G8H82QNPNVZCHG
  amount:
    description: Amount allocated from the credit memo to the invoice.
    type: number
    format: double
