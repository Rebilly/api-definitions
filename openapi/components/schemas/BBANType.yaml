type: object
description: BBAN type object.
required:
  - accountNumberType
  - method
  - customerId
  - accountNumber
  - routingNumber
  - accountType
  - billingAddress
properties:
  method:
    description: Payment method of the payment instrument.
    type: string
    enum:
      - ach
  customerId:
    $ref: ./CustomerId.yaml
  accountNumberType:
    description: |-
      Type of the customer's bank account number.
      A valid value is a Basic Bank Account Number (BBAN) or an International Bank Account Number (IBAN).
    type: string
    enum:
      - BBAN
  accountNumber:
    description: |-
      Customer's bank account number.
      Detailed information on all ISO 13616-compliant national IBAN formats is available in the [SWIFT IBAN Registry](https://www.swift.com/standards/data-standards/iban).
    type: string
    pattern: '^[0-9]+$'
    example: '1234567890'
  routingNumber:
    description: Bank routing number.
    type: string
    pattern: '^[0-9]+$'
    example: '123456789'
  accountType:
    description: Type of the bank account.
    type: string
    enum:
      - checking
      - savings
      - other
  bankName:
    description: Name of the bank.
    type: string
  bic:
    description: Bank Identifier Code (BIC).
    type: string
  billingAddress:
    description: Customer's billing address.
    $ref: ./ContactObject.yaml
  customFields:
    $ref: ./ResourceCustomFields.yaml
  riskMetadata:
    $ref: ./RiskMetadata.yaml
  useAsBackup:
    $ref: ./UseAsBackup.yaml
