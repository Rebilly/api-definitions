type: object
required:
  - items
  - renewalPolicy
  - prorated
properties:
  items:
    description: Details of items in the order.
    type: array
    minItems: 1
    items:
      type: object
      description: |-
        New set of items for the subscription.
        To remove an item, include the items array and exclude the items you want to remove.
      required:
        - plan
      properties:
        plan:
          description: Plan details.
          oneOf:
            - $ref: ./OriginalPlan.yaml
            - $ref: ./FlexiblePlan.yaml
        quantity:
          description: Number of units of the product on the given plan.
          type: integer
        usageLimits:
          $ref: ./UsageLimits.yaml
  renewalPolicy:
    description: |-
      How the service periods and trial state of the subscription order are managed when its items change.

      The `reset` and `retain` values are deprecated.
      The deprecated `keepTrial` and `ignoreRecurring` are ignored unless `reset` or `retain` is used.
    type: string
    enum:
      - resetToRecurring
      - retainRecurring
      - retainTrialThenRecurring
      - retainTrialOnly
      - reset
      - retain
    x-enumDescriptions:
      resetToRecurring: Resets the service periods, ends any trial, and converts trial-only items to recurring.
      retainRecurring: Retains the current service periods, ends any trial, and converts trial-only items to recurring.
      retainTrialThenRecurring: |-
        Retains the trial until it ends, then converts the item to recurring.
        Returns a validation error if the order has no trial.
      retainTrialOnly: |-
        Retains the trial and keeps the item as trial-only.
        Returns a validation error if the order is not trial-only.
      reset: |-
        Deprecated.
        Use `resetToRecurring` instead.
        Resets the `renewalTime` to a newly calculated value.
      retain: |-
        Deprecated.
        Use `retainRecurring`, `retainTrialThenRecurring`, or `retainTrialOnly` instead.
        Retains the current `renewalTime`.
  prorated:
    description: |-
      Specifies whether to give a pro rata credit for the amount of time remaining between the `effectiveTime` and the end of the current period.

      In addition, if the `renewalTime` is retained, by setting the `renewalPolicy` to `retainRecurring`, `retainTrialThenRecurring` or `retainTrialOnly`,
      a pro rata debit occurs for the amount between the `effectiveTime` and the `renewalTime` as a percentage of the normal period size.
    type: boolean
  effectiveTime:
    description: |-
      Date from which the renewal time for `reset` operations and proration calculations are made.
      If this field is omitted, this value defaults to the current time.
    type: string
    format: date-time
  preview:
    description: |-
      Specifies if changes to the subscription can be previewed.
      Subscriptions cannot be changed in preview.
    type: boolean
    default: false
  keepTrial:
    deprecated: true
    description: |-
      Deprecated.
      Use the `retainTrialThenRecurring` or `retainTrialOnly` value of `renewalPolicy` instead.

      Specifies if the order must retain its active trial.
      This field is only applicable if `renewalPolicy` is set to the deprecated value `retain`.
    type: boolean
    default: false
  ignoreRecurring:
    deprecated: true
    description: |-
      Deprecated.
      Use the `retainTrialOnly` value of `renewalPolicy` instead.

      Specifies if the order must ignore the recurring settings of its items.
      This field is only applicable if the order is trial-only and the `keepTrial` value is `true`.
      For more information, see [Trial-only order](https://www.rebilly.com/docs/dev-docs/subscriptions#trial-only-subscription).
    type: boolean
    default: false
