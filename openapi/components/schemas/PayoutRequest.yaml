type: object
required:
  - websiteId
  - customerId
  - currency
  - amount
properties:
  id:
    type: string
    readOnly: true
    description: Unique resource ID.
    maxLength: 50
    example: pout_req_0YVDMDE2BMC6KBB5MX76RF6T80
  websiteId:
    $ref: ./WebsiteId.yaml
  customerId:
    description: ID of the customer who is requesting a payout.
    $ref: ./CustomerId.yaml
  paymentInstrumentId:
    type:
      - 'string'
      - 'null'
    description: ID of the requested payment instrument to offer for the payout.
    maxLength: 50
    example: inst_0YVB8KPKNXCBR9EDX7JHSED75N
  splitFromPayoutRequestId:
    description: |-
      ID of the payout request from which this request is split,
      or `null` if this request is not created by a split operation.
    type:
      - 'string'
      - 'null'
    readOnly: true
    maxLength: 50
    example: pout_req_0YVDMDE2BMC6KBB5MX76RF6T80
  mergedIntoPayoutRequestId:
    description: |-
      ID of the payout request that this request is merged into,
      or `null` if it is not merged into another request.
    type:
      - 'string'
      - 'null'
    readOnly: true
    maxLength: 50
    example: pout_req_0YVDMDE2BMC6KBB5MX76RF6T80
  currency:
    description: Currency of the payout.
    $ref: ./CurrencyCode.yaml
  amount:
    description: Amount of the payout.
    type: number
    format: double
    x-type: Money
  availableAmount:
    description: Available payout request amount that has not been allocated.
    readOnly: true
    type: number
    format: double
    x-type: Money
  description:
    description: Description of payout request.
    type:
      - 'string'
      - 'null'
  status:
    description: Status of the request.
    type: string
    readOnly: true
    enum:
      - pending
      - ready
      - approved
      - in-progress
      - fulfilled
      - canceled
      - split
      - merged
    x-enumDescriptions:
      pending: |-
        Request was created by the customer and is in a pending state for the [configured pending period](https://www.rebilly.com/catalog/all/websites/putwebsite#websites/putwebsite/t=request&path=settings/payoutrequest/pendingperiodhours), unless it is marked as ready by a member of your organization.
        When automatic readiness is enabled, the payout request transitions to the `ready` state after the pending period elapses and the configured [transition time](https://www.rebilly.com/catalog/all/websites/putwebsite#websites/putwebsite/t=request&path=settings/payoutrequest/automaticreadinesstime) is reached.
        Depending on the configured [`automaticReadinessEnabled`](https://www.rebilly.com/catalog/all/websites/putwebsite#websites/putwebsite/t=request&path=settings/payoutrequest/automaticreadinessenabled) setting, this may be the initial status assigned to new payout requests, or this status may not be used.
      ready: |-
        Request was created by the customer and is ready for review.
        Depending on the configured [`automaticReadinessEnabled`](https://www.rebilly.com/catalog/all/websites/putwebsite#websites/putwebsite/t=request&path=settings/payoutrequest/automaticreadinessenabled) setting, this may be the initial status assigned to new payout requests.
      approved: Request was reviewed, approved, and is ready for processing.
      in-progress: Request has allocations and is being processed.
      fulfilled: Request is fully paid out.
      canceled: Request is canceled by merchant or customer.
      split: Request was split into two or more payout requests.
      merged: Request was merged into another payout request.
  blocked:
    description: |-
      Specifies whether the payout request is blocked or unblocked.

      When blocked, the payout request cannot transition to `ready`, `approved`, `in-progress`, `merged`, `split`, or `canceled`.
      Allocation creation, allocation processing, and cancellation of pending allocations are also prevented.
      A blocked payout request can still transition to the `fulfilled` status if allocation processing starts before the payout request is blocked.
    type: boolean
    readOnly: false
    example: false
  blockReason:
    oneOf:
      - $ref: ./PayoutRequestBlockReason.yaml
      - type: 'null'
  splitReason:
    oneOf:
      - $ref: ./PayoutRequestSplitReason.yaml
      - type: 'null'
  batchId:
    description: ID of the payout request batch that contains this request.
    type:
      - 'string'
      - 'null'
    readOnly: true
    maxLength: 50
    example: preq_batch_0YVDMDE2BMC6KBB5MX76RF6T80
  selectPaymentInstrumentUrl:
    readOnly: true
    type: string
    format: uri
    description: URL for the customer to select a preferred payment instrument.
  allocations:
    type: array
    description: List of payout request allocations for the payout request.
    readOnly: true
    items:
      $ref: ./PayoutRequestAllocation.yaml
  selectedPaymentInstrumentRedirectUrl:
    description: |-
      URL where the customer is redirected when a payment instrument is selected. The default value is the website URL.
      Use `{{id}}` as a placeholder for the payout request ID.
    type: string
    format: uri
    maxLength: 2083
    example: https://example.com/payout-request-success
  cancellationReason:
    $ref: ./PayoutRequestCancellation.yaml
  createdTime:
    description: Date and time when the payout request is created.
    $ref: ./CreatedTime.yaml
  updatedTime:
    description: Date and time when the payout request is updated.
    $ref: ./UpdatedTime.yaml
  _links:
    type: array
    description: Related links.
    readOnly: true
    items:
      type: object
      properties:
        href:
          description: Link URL.
          type: string
        rel:
          description: Type of link.
          type: string
          enum:
            - self
            - splitFrom
            - mergedInto
            - paymentInstrument
