type: object
required:
  - amounts
  - splitReason
properties:
  amounts:
    description: |-
      Amounts for each new payout request.
      One request is created per amount.
      Provide at least two amounts.
      Each amount must be greater than zero.
      The sum must equal the original payout request amount.
    type: array
    minItems: 2
    maxItems: 100
    items:
      type: number
      format: double
      x-type: Money
      exclusiveMinimum: 0
    example: [50.00, 30.00, 20.00]
  splitReason:
    $ref: ./PayoutRequestSplitReason.yaml
  splitDescription:
    description: Additional description for splitting the payout request.
    type:
      - 'string'
      - 'null'
    maxLength: 255
