type: object
title: Cryptocurrency token
required:
  - method
properties:
  method:
    description: Payment method of the token.
    type: string
    enum: [cryptocurrency]
  walletName:
    description: Name of the crypto wallet.
    type:
      - 'string'
      - 'null'
    maxLength: 255
  walletAddress:
    description: Address of the crypto wallet.
    type:
      - 'string'
      - 'null'
    maxLength: 255
  walletCurrency:
    description: Currency of the crypto wallet.
    type:
      - 'string'
      - 'null'
    maxLength: 255
  walletNetwork:
    description: Network of the crypto wallet.
    type:
      - 'string'
      - 'null'
    maxLength: 255
  billingAddress:
    description: Billing address object.
    oneOf:
      - $ref: ./ContactObject.yaml
      - type: 'null'
  id:
    description: ID of the token.
    readOnly: true
    $ref: ./ResourceId.yaml
  isUsed:
    description: Specifies if the token is already used.
    type: boolean
    default: false
    readOnly: true
  riskMetadata:
    oneOf:
      - $ref: ./RiskMetadata.yaml
      - type: 'null'
  leadSource:
    allOf:
      - $ref: ./LeadSource.yaml
    writeOnly: true
  createdTime:
    $ref: ./CreatedTime.yaml
  updatedTime:
    $ref: ./UpdatedTime.yaml
  usageTime:
    description: Date and time when the token is used.
    type:
      - 'string'
      - 'null'
    format: date-time
    readOnly: true
  expirationTime:
    description: Date and time when the token expired.
    type:
      - 'string'
      - 'null'
    format: date-time
    readOnly: true
  _links:
    $ref: ./SelfLink.yaml
