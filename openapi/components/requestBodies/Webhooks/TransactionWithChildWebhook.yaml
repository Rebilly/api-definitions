content:
  application/json:
    schema:
      properties:
        transactionId:
          $ref: ../../schemas/TransactionId.yaml
        eventType:
          type: string
          description: Type of event that triggered the webhook.
          enum:
            - transaction-partially-refunded
            - transaction-refunded
            - transaction-voided
        _embedded:
          type: object
          description: Embedded objects related to the transaction event.
          properties:
            transaction:
              $ref: ../../schemas/Transaction.yaml
            childTransaction:
              $ref: ../../schemas/Transaction.yaml
        _links:
          type: array
          description: Links to related resources.
          items:
            type: object
            properties:
              href:
                description: URL of the link.
                type: string
              rel:
                description: Relationship type of the link.
                type: string
                enum:
                  - transaction
                  - childTransaction
description: Payload of transaction-related webhook event.
