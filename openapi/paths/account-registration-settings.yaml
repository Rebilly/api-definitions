get:
  x-products:
    - Core
  x-badges:
    - name: Experimental
  tags:
    - Account registration settings
  summary: Retrieve account registration settings
  operationId: GetAccountRegistrationSettingsCollection
  x-sdk-operation-name: getAll
  description: Retrieves a list of all account registration settings.
  parameters:
    - $ref: ../components/parameters/collectionLimit.yaml
    - $ref: ../components/parameters/collectionOffset.yaml
  responses:
    '200':
      description: List of account registration settings retrieved.
      headers:
        Pagination-Total:
          $ref: ../components/headers/Pagination-Total.yaml
        Pagination-Limit:
          $ref: ../components/headers/Pagination-Limit.yaml
        Pagination-Offset:
          $ref: ../components/headers/Pagination-Offset.yaml
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/AccountRegistrationSettings.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
post:
