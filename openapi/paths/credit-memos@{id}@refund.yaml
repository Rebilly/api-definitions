parameters:
  - $ref: ../components/parameters/resourceId.yaml
post:
  x-products:
    - Core
  tags:
    - Credit memos
  summary: Refund a credit memo
  operationId: PostCreditMemoRefund
  x-sdk-operation-name: refund
  description: |-
    Refunds a credit memo with a specified ID.
    The transactions of the last invoice for the order or the invoice directly related to the credit memo are refunded.
  responses:
    '200':
      description: Credit memo refunded.
      headers:
        Location:
          $ref: ../components/headers/Location.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CreditMemo.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '409':
      description: Credit memo available amount exceeds the refundable amount of invoice transactions.
      $ref: ../components/responses/Conflict.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
