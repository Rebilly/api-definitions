      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '409':
      $ref: ../components/responses/Conflict.yaml
    '422':
      $ref: ../components/responses/ValidationError.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
delete:
  x-products:
    - Core
  x-badges:
    - name: Experimental
  tags:
    - Account registration settings
  summary: Delete account registration settings
  operationId: DeleteAccountRegistrationSettings
  x-sdk-operation-name: delete
  description: |-
    Deletes account registration settings with a specified ID.
    Default account registration settings cannot be deleted.
  responses:
