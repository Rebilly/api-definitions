parameters:
  - $ref: ../components/parameters/resourceId.yaml
post:
  x-badges:
    - name: Experimental
  x-products:
    - Core
  tags:
    - Transactions
  summary: Remove requests from a payout request batch
  operationId: PostRemovePayoutRequestsFromBatch
  x-sdk-operation-name: removePayoutRequests
  description: |-
    Removes specified payout requests from a batch with a specified ID by clearing `batchId` on each request.
    This operation preserves each payout request, status, and blocked state.
    Removes requests regardless of status or allocations.

    This operation is atomic.
    If any payout request is not associated with the specified batch,
    the operation clears no associations with the batch.
  requestBody:
    required: true
    description: Payout requests to remove from the batch.
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - payoutRequestIds
          properties:
            payoutRequestIds:
              description: IDs of the payout requests to remove from the batch.
              type: array
              minItems: 1
              maxItems: 1000
              uniqueItems: true
              items:
                type: string
                maxLength: 50
                example: pout_req_0YVDMDE2BMC6KBB5MX76RF6T80
  responses:
    '200':
      description: Payout requests removed from the batch.
      headers:
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PayoutRequestBatch.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '409':
      description: One or more payout requests are not associated with the specified batch.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProblemTypes/Conflict.yaml
    '422':
      $ref: ../components/responses/ValidationError.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
