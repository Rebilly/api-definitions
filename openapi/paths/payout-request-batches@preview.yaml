get:
  x-badges:
    - name: Experimental
  x-products:
    - Core
  tags:
    - Transactions
  summary: Preview payout request batch results
  operationId: GetPayoutRequestBatchPreview
  x-sdk-operation-name: preview
  description: |-
    Retrieves aggregate information for the payout requests that match a specified filter.

    If more than 1000 payout requests match the filter, only the oldest 1000 are included in the preview.
  parameters:
    - name: filter
      in: query
      description: |-
        Filter string that is used to select payout requests.
        This field uses the same format as collection filter parameters.
        
        Use semicolons to separate multiple filter conditions.
        Available filter fields: `id`, `status`, `websiteId`, `customerId`, `currency`, `amount`, `createdTime`, `updatedTime`.
        
        If a `batchId` filter is provided, it is ignored.
        Payout requests that are already included in a batch are always excluded from the results.
      schema:
        type: string
        example: 'status:pending;websiteId:ws_0YVDMDE2BMC6KBB5MX76RF6T80'
  responses:
    '200':
      description: Preview retrieved.
      content:
        application/json:
          schema:
            type: object
            properties:
              matchingCount:
                description: Total number of matching payout requests, regardless of the preview limit.
                type: integer
                minimum: 0
                example: 42
              customerCount:
                description: Number of unique customers in the matching payout requests.
                type: integer
                minimum: 0
                example: 3
              totalAmountByCurrency:
                description: Total amount grouped by currency for matching payout requests.
                type: array
                items:
                  type: object
                  required:
                    - currency
                    - amount
                  properties:
                    currency:
                      $ref: ../components/schemas/CurrencyCode.yaml
                    amount:
                      type: number
    '400':
      description: Empty or invalid filter provided.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProblemTypes/Problem.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
