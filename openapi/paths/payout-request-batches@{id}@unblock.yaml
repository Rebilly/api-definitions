parameters:
  - $ref: ../components/parameters/resourceId.yaml
post:
  x-badges:
    - name: Experimental
  x-products:
    - Core
  tags:
    - Transactions
  summary: Unblock payout requests in a batch
  operationId: PostPayoutRequestBatchUnblock
  x-sdk-operation-name: unblock
  description: |-
    Unblocks every blocked payout request in a batch with a specified ID.
    Leaves payout requests without a block unchanged.
    Processes all requests in the batch, up to the 1000-request batch limit, without changing batch membership.
    This operation is atomic.
  responses:
    '200':
      description: Payout requests in the batch unblocked.
      headers:
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PayoutRequestBatch.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
